name: smart_campus_assistant
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  mobile_scanner: ^3.5.5
  cupertino_icons: ^1.0.8
  qr_flutter: ^4.1.0
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^17.2.2
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/college_logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/college_logo.png" 
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF" 
  adaptive_icon_foreground: "assets/images/college_logo_icon.png" 